# Pre-commit hooks. Install once:  python -m pre_commit install
# Run manually:                    python -m pre_commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check          # lint PyDemo Python against PyDemo/pyproject.toml
        files: ^PyDemo/.*\.py$
